services:
  - type: web
    name: ai-college-chatbot
    runtime: python
    repo: https://github.com/89184/AI-Chatbot-for-Student-Queries
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      python backend/train.py
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT backend.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: FLASK_ENV
        value: production